<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section - Task 03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
        The Hero Section is the first thing a user sees.
        It usually has a big headline and a Call to Action (CTA).
    -->
    <section class="hero">
        <div class="hero-content">
            <h1>Build Your Next SaaS Idea <span class="highlight">Faster</span></h1>
            <p>The ultimate platform for Java developers to master the modern frontend. Simple, educational, and hands-on.</p>
            
            <div class="hero-btns">
                <a href="#" class="btn btn-primary">Get Started for Free</a>
                <a href="#" class="btn btn-secondary">Watch Demo</a>
            </div>
        </div>
    </section>

    <section class="dummy-content">
        <p>Scroll down to see the sticky effect if you added a navbar (optional).</p>
    </section>
</body>
</html>
