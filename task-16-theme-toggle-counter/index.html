<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 16: Theme Toggle + Counter</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Theme Toggle + Counter</h1>
            <!-- Theme toggle button -->
            <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
        </div>

        <div class="content">
            <p>Click the buttons below to increment or decrement the counter. Your theme preference and counter value are saved in localStorage!</p>
            
            <div class="counter-display">
                <span id="counterValue">0</span>
            </div>

            <div class="button-group">
                <button id="decrementBtn" class="btn btn-danger">- Decrement</button>
                <button id="resetBtn" class="btn btn-warning">Reset</button>
                <button id="incrementBtn" class="btn btn-success">+ Increment</button>
            </div>

            <div class="info-box">
                <p><strong>Current Theme:</strong> <span id="themeStatus">Light</span></p>
                <p><strong>Counter Value:</strong> <span id="counterStatus">0</span></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
