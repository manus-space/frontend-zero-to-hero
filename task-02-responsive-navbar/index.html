<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar - Task 02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SaaSLogo</div>
        
        <!-- 
            The checkbox hack for a CSS-only hamburger menu.
            The <label> is linked to the <input> via the 'id'.
        -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
        </label>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#" class="btn-signup">Sign Up</a></li>
        </ul>
    </nav>

    <main>
        <div class="content">
            <h1>Responsive Navigation Bar</h1>
            <p>Try resizing your browser window to see the hamburger menu appear on smaller screens!</p>
        </div>
    </main>
</body>
</html>
