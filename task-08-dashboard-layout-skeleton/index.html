<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout - Task 08</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">SaaS Admin</div>
            <nav class="sidebar-nav">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Projects</a>
                <a href="#">Users</a>
                <a href="#">Settings</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="header">
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                </div>
                <div class="user-profile">
                    <span>Alex Dev</span>
                    <img src="https://via.placeholder.com/32" alt="User">
                </div>
            </header>

            <!-- Main Content -->
            <main class="content">
                <div class="stats-grid">
                    <div class="stat-card">Total Revenue: $12,400</div>
                    <div class="stat-card">Active Users: 1,205</div>
                    <div class="stat-card">New Signups: 48</div>
                </div>
                
                <div class="data-section">
                    <div class="chart-placeholder">
                        <h3>Revenue Over Time</h3>
                        <div class="box">Chart Area</div>
                    </div>
                    <div class="recent-activity">
                        <h3>Recent Activity</h3>
                        <ul>
                            <li>User A signed up</li>
                            <li>User B upgraded to Pro</li>
                            <li>System update completed</li>
                        </ul>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
