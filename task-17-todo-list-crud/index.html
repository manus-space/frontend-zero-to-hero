<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 17: Todo List CRUD</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Todo List</h1>
        <p>Add, complete, and delete todos. Your list is saved automatically!</p>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Add a new todo...">
            <button id="addBtn" class="btn btn-primary">Add Todo</button>
        </div>

        <div class="stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
            <span>Remaining: <strong id="remainingCount">0</strong></span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <button id="clearBtn" class="btn btn-danger" style="width: 100%; margin-top: 20px;">Clear All Completed</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
