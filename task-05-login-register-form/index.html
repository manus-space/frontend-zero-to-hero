<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Task 05</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <!-- 
            The <form> element is the foundation of user input.
            Even without JS, we use HTML attributes for basic validation.
        -->
        <form class="auth-form">
            <h2>Welcome Back</h2>
            <p class="subtitle">Please enter your details to login.</p>

            <div class="form-group">
                <!-- <label> is crucial for accessibility and linking to the input -->
                <label for="email">Email Address</label>
                <!-- type="email" provides basic browser-side validation -->
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>

            <p class="switch-form">
                Don't have an account? <a href="#">Create one</a>
            </p>
        </form>
    </div>
</body>
</html>
